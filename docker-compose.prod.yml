services:
  nginx:
    image: nginx:alpine
    container_name: tee-su-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    container_name: tee-su-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - API_URL=http://backend:4000
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    container_name: tee-su-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      - TMPDIR=/app/uploads
      - NODE_ENV=production
    depends_on:
      - db
    restart: unless-stopped

  db:
    container_name: tee-su-db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: teesu
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
  certbot-webroot:
